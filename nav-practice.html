<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивная навигация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .header {
            background-color: #333;
            padding: 20px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            background-color: #555;
            border-radius: 5px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .nav a:hover {
            background-color: #777;
        }

        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .content h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .content p {
            color: #666;
            line-height: 1.6;
        }

        @media (min-width: 768px) {
            .nav {
                flex-direction: row;
                gap: 15px;
            }

            .nav a {
                background-color: transparent;
                padding: 10px 20px;
            }

            .nav a:hover {
                background-color: #555;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="#">Главная</a>
            <a href="#">О нас</a>
            <a href="#">Услуги</a>
            <a href="#">Портфолио</a>
            <a href="#">Контакты</a>
        </nav>
    </header>

    <main class="content">
        <h1>Адаптивная навигация</h1>
    </main>
</body>
</html>
